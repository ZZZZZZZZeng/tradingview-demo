<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMEX 黄金 K线图</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 15px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-size: 1.2rem; color: #ffd700; }
        .symbol { font-size: 1.3rem; font-weight: bold; color: #ffd700; }
        .price-info { text-align: right; }
        .price { font-size: 1.4rem; font-weight: bold; }
        .change { font-size: 0.9rem; }
        .change.positive { color: #00ff88; }
        .change.negative { color: #ff4757; }
        #chart { flex: 1; width: 100%; }
        .toolbar {
            padding: 10px 20px;
            background: #16213e;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 16px;
            background: #0f3460;
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn:hover { background: #e94560; }
        .btn.active { background: #ffd700; color: #1a1a2e; }
        .info-bar {
            padding: 8px 20px;
            background: #16213e;
            font-size: 0.8rem;
            color: #888;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🥇 COMEX 黄金期货</div>
        <div class="symbol">GC=F (黄金)</div>
        <div class="price-info">
            <div class="price" id="currentPrice">$--</div>
            <div class="change" id="priceChange">--</div>
        </div>
    </header>
    <div class="toolbar">
        <button class="btn" data-range="30">1个月</button>
        <button class="btn active" data-range="60">2个月</button>
        <button class="btn" data-range="90">3个月</button>
        <button class="btn" data-range="180">6个月</button>
        <button class="btn" data-range="365">1年</button>
    </div>
    <div id="chart"></div>
    <div class="info-bar">
        <span>数据来源: Yahoo Finance (模拟数据)</span>
        <span>Powered by TradingView Lightweight Charts</span>
    </div>

    <script>
        // 生成模拟黄金价格数据 (基于真实价格范围)
        function generateGoldData(days) {
            const data = [];
            let time = new Date();
            time.setDate(time.getDate() - days);
            time.setHours(0, 0, 0, 0);
            
            // 黄金近期价格大约在 2900-3100 美元/盎司
            let basePrice = 2950 + Math.random() * 100; 
            
            for (let i = days; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                const timestamp = Math.floor(date.getTime() / 1000);
                
                // 模拟黄金波动
                const volatility = 30 + Math.random() * 20;
                const trend = (Math.random() - 0.48) * 20; // 轻微上涨趋势
                
                const open = basePrice;
                const close = basePrice + trend + (Math.random() - 0.5) * volatility;
                const high = Math.max(open, close) + Math.random() * volatility * 0.5;
                const low = Math.min(open, close) - Math.random() * volatility * 0.5;
                
                data.push({
                    time: timestamp,
                    open: Math.round(open * 100) / 100,
                    high: Math.round(high * 100) / 100,
                    low: Math.round(low * 100) / 100,
                    close: Math.round(close * 100) / 100,
                });
                
                basePrice = close;
            }
            return data;
        }

        // 创建图表
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            width: window.innerWidth,
            height: window.innerHeight - 140,
            layout: {
                background: { type: 'solid', color: '#1a1a2e' },
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#2b2b43' },
                horzLines: { color: '#2b2b43' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: '#2b2b43',
            },
            timeScale: {
                borderColor: '#2b2b43',
                timeVisible: true,
            },
        });

        // K线系列
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88',
            downColor: '#ff4757',
            borderUpColor: '#00ff88',
            borderDownColor: '#ff4757',
            wickUpColor: '#00ff88',
            wickDownColor: '#ff4757',
        });

        // 成交量系列
        const volumeSeries = chart.addHistogramSeries({
            color: '#26a69a',
            priceFormat: { type: 'volume' },
            priceScaleId: '',
        });
        
        volumeSeries.priceScale().applyOptions({
            scaleMargins: { top: 0.8, bottom: 0 },
        });

        // 加载数据
        function loadData(days) {
            const data = generateGoldData(days);
            candleSeries.setData(data);
            
            // 生成成交量数据
            const volumeData = data.map(d => ({
                time: d.time,
                value: Math.round(100000 + Math.random() * 200000),
                color: d.close >= d.open ? 'rgba(0, 255, 136, 0.5)' : 'rgba(255, 71, 87, 0.5)',
            }));
            volumeSeries.setData(volumeData);
            
            // 更新价格显示
            const last = data[data.length - 1];
            const first = data[0];
            const currentPrice = last.close;
            const change = ((last.close - first.open) / first.open * 100).toFixed(2);
            
            document.getElementById('currentPrice').textContent = '$' + currentPrice.toFixed(2);
            const changeEl = document.getElementById('priceChange');
            changeEl.textContent = (change >= 0 ? '+' : '') + change + '%';
            changeEl.className = 'change ' + (change >= 0 ? 'positive' : 'negative');
            
            chart.timeScale().fitContent();
        }

        // 初始化加载60天数据
        loadData(60);

        // 按钮事件
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const days = parseInt(btn.dataset.range);
                loadData(days);
            });
        });

        // 窗口调整
        window.addEventListener('resize', () => {
            chart.resize(window.innerWidth, window.innerHeight - 140);
        });
    </script>
</body>
</html>
