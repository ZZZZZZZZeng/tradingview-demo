<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView 风格图表</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 15px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: #00d9ff; }
        .symbol { font-size: 1.2rem; color: #e94560; font-weight: 600; }
        .price { font-size: 1.5rem; font-weight: bold; }
        .change { color: #00ff88; }
        .change.negative { color: #ff4757; }
        #chart { flex: 1; width: 100%; }
        .toolbar {
            padding: 10px 20px;
            background: #16213e;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 8px 16px;
            background: #0f3460;
            border: none;
            color: #fff;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn:hover { background: #e94560; }
        .btn.active { background: #00d9ff; color: #1a1a2e; }
    </style>
</head>
<body>
    <header>
        <div class="logo">📈 TradingView Demo</div>
        <div class="symbol">BTC/USD</div>
        <div class="price">$67,432.50 <span class="change">+2.34%</span></div>
    </header>
    <div class="toolbar">
        <button class="btn active">1分钟</button>
        <button class="btn">5分钟</button>
        <button class="btn">15分钟</button>
        <button class="btn">1小时</button>
        <button class="btn">1天</button>
    </div>
    <div id="chart"></div>

    <script>
        // 创建图表
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            width: window.innerWidth,
            height: window.innerHeight - 120,
            layout: {
                background: { type: 'solid', color: '#1a1a2e' },
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#2b2b43' },
                horzLines: { color: '#2b2b43' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: '#2b2b43',
            },
            timeScale: {
                borderColor: '#2b2b43',
            },
        });

        // K线系列
        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88',
            downColor: '#ff4757',
            borderUpColor: '#00ff88',
            borderDownColor: '#ff4757',
            wickUpColor: '#00ff88',
            wickDownColor: '#ff4757',
        });

        // 模拟数据
        function generateData() {
            const data = [];
            let time = new Date('2024-01-01').getTime() / 1000;
            let price = 42000;
            
            for (let i = 0; i < 500; i++) {
                const volatility = 500;
                const open = price;
                const close = price + (Math.random() - 0.5) * volatility;
                const high = Math.max(open, close) + Math.random() * volatility * 0.5;
                const low = Math.min(open, close) - Math.random() * volatility * 0.5;
                
                data.push({
                    time: time,
                    open: open,
                    high: high,
                    low: low,
                    close: close,
                });
                
                price = close;
                time += 3600; // 每小时
            }
            return data;
        }

        const data = generateData();
        candleSeries.setData(data);

        // 成交量系列
        const volumeSeries = chart.addHistogramSeries({
            color: '#26a69a',
            priceFormat: { type: 'volume' },
            priceScaleId: '',
        });
        
        volumeSeries.priceScale().applyOptions({
            scaleMargins: { top: 0.8, bottom: 0 },
        });

        const volumeData = data.map(d => ({
            time: d.time,
            value: Math.random() * 1000 + 100,
            color: d.close >= d.open ? 'rgba(0, 255, 136, 0.5)' : 'rgba(255, 71, 87, 0.5)',
        }));
        volumeSeries.setData(volumeData);

        // 调整窗口大小
        window.addEventListener('resize', () => {
            chart.resize(window.innerWidth, window.innerHeight - 120);
        });

        // 模拟实时更新
        setInterval(() => {
            const last = data[data.length - 1];
            const newPrice = last.close + (Math.random() - 0.5) * 100;
            const newTime = last.time + 3600;
            
            candleSeries.update({
                time: newTime,
                open: last.close,
                high: Math.max(last.close, newPrice),
                low: Math.min(last.close, newPrice),
                close: newPrice,
            });
            
            data.push({
                time: newTime,
                open: last.close,
                high: Math.max(last.close, newPrice),
                low: Math.min(last.close, newPrice),
                close: newPrice,
            });
        }, 1000);

        // 按钮切换
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
</body>
</html>
