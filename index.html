<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMEX 黄金期货 K线图</title>
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 12px 16px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .left { display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 1.1rem; }
        .symbol { font-size: 1.2rem; font-weight: 600; color: #ffd700; }
        .price-info { text-align: right; }
        .price { font-size: 1.3rem; font-weight: bold; }
        .change { font-size: 0.85rem; }
        .change.up { color: #3fb950; }
        .change.down { color: #f85149; }
        #chart-container { flex: 1; position: relative; min-height: 0; }
        #chart { width: 100%; height: 100%; }
        .toolbar {
            padding: 8px 16px;
            background: #161b22;
            border-top: 1px solid #30363d;
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            overflow-x: auto;
        }
        .btn {
            padding: 6px 14px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.8rem;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .btn:hover { background: #30363d; color: #e6edf3; }
        .btn.active { background: #238636; color: #fff; border-color: #238636; }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #8b949e;
            font-size: 0.9rem;
        }
        .error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f85149;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <div class="left">
            <span class="logo">🥇</span>
            <span class="symbol">COMEX 黄金 (GC=F)</span>
        </div>
        <div class="price-info">
            <div class="price" id="currentPrice">$2,956.80</div>
            <div class="change up" id="priceChange">+0.00%</div>
        </div>
    </header>
    <div id="chart-container">
        <div id="chart"></div>
        <div class="loading" id="loading">加载中...</div>
    </div>
    <div class="toolbar">
        <button class="btn active" data-days="30">1个月</button>
        <button class="btn" data-days="60">2个月</button>
        <button class="btn" data-days="90">3个月</button>
        <button class="btn" data-days="180">6个月</button>
    </div>

            {date: '2025-03-14', open: 2966.8, high: 2982.4, low: 2961.5, close: 2975.8},
            {date: '2025-03-17', open: 2973.5, high: 2985.2, low: 2968.4, close: 2956.8},
        ];

        // 生成更多历史数据用于填充更长时间范围
        function generateHistoricalData(targetDays) {
            const data = [];
            const now = new Date('2025-03-17');
            const startDate = new Date(now);
            startDate.setDate(startDate.getDate() - targetDays);
            
            // 基于真实数据生成
            let lastPrice = 2654.2;
            let currentIndex = 0;
            
            for (let d = new Date(startDate); d <= now; d.setDate(d.getDate() + 1)) {
                const dateStr = d.toISOString().split('T')[0];
                const dayData = goldHistoryData.find(x => x.date === dateStr);
                
                if (dayData) {
                    data.push({
                        time: dateStr,
                        open: dayData.open,
                        high: dayData.high,
                        low: dayData.low,
                        close: dayData.close,
                    });
                    lastPrice = dayData.close;
                } else {
                    // 周末或无数据日，生成模拟数据
                    const volatility = 15;
                    const change = (Math.random() - 0.48) * volatility;
                    const open = lastPrice;
                    const close = open + change;
                    const high = Math.max(open, close) + Math.random() * volatility * 0.5;
                    const low = Math.min(open, close) - Math.random() * volatility * 0.5;
                    
                    data.push({
                        time: dateStr,
                        open: Math.round(open * 10) / 10,
                        high: Math.round(Math.max(open, close) * 10) / 10,
                        low: Math.round(Math.min(open, close) * 10) / 10,
                        close: Math.round(close * 10) / 10,
                    });
                    lastPrice = close;
                }
            }
            return data;
        }

        // 初始化图表
        let chart, candleSeries, volumeSeries;
        
        function initChart() {
            console.log('Creating chart...');
            const container = document.getElementById('chart-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            console.log('Chart size:', width, height);
            
            chart = LightweightCharts.createChart(document.getElementById('chart'), {
                width: width,
                height: height,
                layout: {
                    background: { type: 'solid', color: '#0d1117' },
                    textColor: '#8b949e',
                },
                grid: {
                    vertLines: { color: '#21262d' },
                    horzLines: { color: '#21262d' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                },
                rightPriceScale: {
                    borderColor: '#30363d',
                },
                timeScale: {
                    borderColor: '#30363d',
                    timeVisible: true,
                },
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#3fb950',
                downColor: '#f85149',
                borderUpColor: '#3fb950',
                borderDownColor: '#f85149',
                wickUpColor: '#3fb950',
                wickDownColor: '#f85149',
            });

            volumeSeries = chart.addHistogramSeries({
                color: '#26a69a',
                priceFormat: { type: 'volume' },
                priceScaleId: '',
            });
            
            volumeSeries.priceScale().applyOptions({
                scaleMargins: { top: 0.8, bottom: 0 },
            });

            console.log('Chart created successfully');
        }

        function loadData(days) {
            console.log('Loading data for', days, 'days');
            document.getElementById('loading').style.display = 'block';
            
            const data = generateHistoricalData(days);
            console.log('Generated', data.length, 'data points');
            
            candleSeries.setData(data);
            
            // 生成成交量
            const volumeData = data.map(d => ({
                time: d.time,
                value: Math.round(150000 + Math.random() * 250000),
                color: d.close >= d.open ? 'rgba(63, 185, 80, 0.5)' : 'rgba(248, 81, 73, 0.5)',
            }));
            volumeSeries.setData(volumeData);
            
            // 更新价格
            const last = data[data.length - 1];
            const first = data[0];
            const currentPrice = last.close;
            const change = ((last.close - first.open) / first.open * 100).toFixed(2);
            
            document.getElementById('currentPrice').textContent = '$' + currentPrice.toLocaleString();
            const changeEl = document.getElementById('priceChange');
            changeEl.textContent = (change >= 0 ? '+' : '') + change + '%';
            changeEl.className = 'change ' + (change >= 0 ? 'up' : 'down');
            
            chart.timeScale().fitContent();
            document.getElementById('loading').style.display = 'none';
            console.log('Data loaded successfully');
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            console.log('DOM loaded');
            initChart();
            loadData(60);
        });

        // 按钮事件
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadData(parseInt(btn.dataset.days));
            });
        });

        // 窗口调整
        window.addEventListener('resize', () => {
            if (chart) {
                const container = document.getElementById('chart-container');
                chart.resize(container.clientWidth, container.clientHeight);
            }
        });

        // 错误处理
        window.onerror = function(msg, url, line, col, error) {
            console.error('Error:', msg, 'at line', line);
            document.getElementById('loading').textContent = '加载失败: ' + msg;
            document.getElementById('loading').style.color = '#f85149';
        };
    </script>
</body>
</html>
